<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Loading</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@100..900&family=Geist:wght@100..900&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Background video -->
  <div class="video-container">
    <video class="video-bg" id="bg-video" autoplay loop muted playsinline></video>
  </div>

  <!-- Background carousel (alternative to video) -->
  <div class="carousel-container" id="carousel-container">
    <div class="carousel-track" id="carousel-track"></div>
    <div class="carousel-dots" id="carousel-dots"></div>
  </div>

  <!-- Background music -->
  <audio id="bg-music" loop></audio>

  <!-- Zipper tear layer -->
  <div class="loader-screen" id="loader-screen">
    <div class="bg-half bg-top" id="bg-top"></div>
    <div class="bg-half bg-bottom" id="bg-bottom"></div>
    <div class="tear-head" id="tear-head"></div>
  </div>

  <!-- Loader indicator -->
  <div id="loader-container">
    <div id="loader-top-row">
      <span id="loader-prefix"></span>
      <span id="loader-percent">00%</span>
    </div>
    <span id="loader-status"></span>
  </div>

  <!-- FiveM real load progress -->
  <div id="real-progress">
    <div id="real-progress-bar"></div>
  </div>

  <!-- Brand block -->
  <div id="brand-block">
    <div style="position:relative; display:inline-block;">
      <img src="" alt="" class="logo-glow" id="logo-glow" aria-hidden="true">
      <img src="" alt="Logo" id="logo-graphic">
    </div>
    <div class="text-mask" id="text-mask">
      <div class="split-wrapper">
        <h1 class="title-main top-half" id="title-top"></h1>
        <h1 class="title-main bottom-half" id="title-bottom" aria-hidden="true"></h1>
      </div>
    </div>
  </div>

  <!-- Navigation -->
  <div class="top-nav" id="top-nav">
    <a class="discord-link" id="discord-link" href="#" target="_blank" rel="noopener" aria-label="Join Discord">
      <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
        <path d="M20.317 4.37a19.79 19.79 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.74 19.74 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.11 13.11 0 0 1-1.872-.892.077.077 0 0 1-.008-.128c.126-.094.252-.192.372-.291a.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.3 12.3 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.84 19.84 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.06.06 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.095 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.095 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
      </svg>
    </a>
  </div>

  <!-- Volume control -->
  <div class="volume-control" id="volume-control">
    <button class="volume-toggle" id="volume-toggle" aria-label="Volume">♫</button>
    <div class="volume-slider-wrap" id="volume-slider-wrap">
      <div class="volume-track" id="volume-track">
        <div class="volume-fill" id="volume-fill"></div>
        <div class="volume-thumb" id="volume-thumb"></div>
      </div>
    </div>
  </div>

  <!-- Announcement ticker -->
  <div class="announce" id="announce">
    <span class="announce-label">NOTICE</span>
    <div class="announce-divider"></div>
    <div class="announce-body" id="announce-body"></div>
  </div>

  <!-- Content panel -->
  <button class="panel-close" id="panel-close" aria-label="Close">✕</button>
  <div class="content-overlay" id="content-overlay">
    <div class="panel-inner" id="panel-content"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/SplitText.min.js"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>

</html>
